name: Lab - k3s external etcd cutover

on:
  workflow_dispatch:
    inputs:
      k3s_channel:
        description: "k3s install channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - latest
      etcd_version:
        description: "Standalone etcd release"
        required: true
        default: "v3.5.21"

permissions:
  contents: read

concurrency:
  group: lab-k3s-external-etcd-cutover
  cancel-in-progress: false

jobs:
  lab:
    name: k3s external etcd cutover validation
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build migrator
        run: |
          set -euo pipefail
          go build -o bin/etcd-migrator ./cmd/etcd-migrator
          ./bin/etcd-migrator --help || true

      - name: Run k3s external etcd cutover lab
        env:
          K3S_CHANNEL: ${{ inputs.k3s_channel }}
          ETCD_VERSION: ${{ inputs.etcd_version }}
        run: |
          set -euo pipefail
          sudo --preserve-env=K3S_CHANNEL,ETCD_VERSION \
            bash scripts/lab_k3s_external_etcd_cutover.sh

      - name: Verify lab artifacts
        run: |
          set -euo pipefail

          lab_dir="$(find runs -maxdepth 1 -type d -name 'lab-k3s-external-etcd-cutover-*' | sort | tail -1)"
          if [[ -z "$lab_dir" ]]; then
            echo "ERROR: No lab directory found" >&2
            exit 1
          fi

          artifact_dir="$lab_dir/artifacts"
          if [[ ! -d "$artifact_dir" ]]; then
            echo "ERROR: Artifact directory not found: $artifact_dir" >&2
            exit 1
          fi

          echo "Verifying artifacts in: $artifact_dir"
          bash scripts/verify_k3s_external_etcd_cutover_artifact.sh "$artifact_dir"

      - name: Run artifact safety scan
        if: always()
        run: |
          set -euo pipefail

          lab_dir="$(find runs -maxdepth 1 -type d -name 'lab-k3s-external-etcd-cutover-*' | sort | tail -1)"
          if [[ -z "$lab_dir" ]]; then
            echo "No lab directory found; skipping safety scan"
            exit 0
          fi

          artifact_dir="$lab_dir/artifacts"
          if [[ ! -d "$artifact_dir" ]]; then
            echo "No artifact directory found; skipping safety scan"
            exit 0
          fi

          echo "Running safety scan on artifacts..."

          secret_files="$(find "$artifact_dir" -type f -name '*secrets-metadata.txt' -print)"
          if [[ -n "$secret_files" ]]; then
            if find "$artifact_dir" -type f -name '*secrets-metadata.txt' -print0 \
              | xargs -0 grep -E -- '\.data[[:space:]:]' 2>/dev/null; then
              echo "ERROR: Forbidden .data field found in secret metadata artifacts" >&2
              exit 1
            fi

            if find "$artifact_dir" -type f -name '*secrets-metadata.txt' -print0 \
              | xargs -0 grep -E -- '\.stringData[[:space:]:]' 2>/dev/null; then
              echo "ERROR: Forbidden .stringData field found in secret metadata artifacts" >&2
              exit 1
            fi

            if find "$artifact_dir" -type f -name '*secrets-metadata.txt' -print0 \
              | xargs -0 grep -E -- '(^|[[:space:]])data:[[:space:]]' 2>/dev/null; then
              echo "ERROR: Forbidden bare data: field found in secret metadata artifacts" >&2
              exit 1
            fi

            if find "$artifact_dir" -type f -name '*secrets-metadata.txt' -print0 \
              | xargs -0 grep -E -- '(^|[[:space:]])stringData:[[:space:]]' 2>/dev/null; then
              echo "ERROR: Forbidden bare stringData: field found in secret metadata artifacts" >&2
              exit 1
            fi
          fi

          if grep -rE -- "-----BEGIN.*PRIVATE KEY-----" "$artifact_dir" 2>/dev/null; then
            echo "ERROR: Private key found in artifacts" >&2
            exit 1
          fi

          if grep -rE -- "client-certificate-data:|client-key-data:" "$artifact_dir" 2>/dev/null; then
            echo "ERROR: kubeconfig credential material found in artifacts" >&2
            exit 1
          fi

          echo "Safety scan completed"

      - name: Upload safe lab evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k3s-external-etcd-cutover-lab
          path: |
            runs/lab-k3s-external-etcd-cutover-*/artifacts/**
            !runs/lab-k3s-external-etcd-cutover-*/artifacts/**/*.db
            !runs/lab-k3s-external-etcd-cutover-*/artifacts/**/*.jsonl
            !runs/lab-k3s-external-etcd-cutover-*/artifacts/**/*.kv.tsv
            !runs/lab-k3s-external-etcd-cutover-*/artifacts/**/*kv*.tsv
          if-no-files-found: warn
